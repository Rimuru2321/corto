<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Resultados — Festival de Cortometrajes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- Include Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="site-header">
    <div class="hd hd1"></div><div class="hd hd2"></div><div class="hd hd3"></div>
    <div class="hdr-in">
      <div class="hdr-logo">
        <div class="hdr-icon">📊</div>
        <div><h1>CineVota</h1><p>Registro de Evaluaciones</p></div>
      </div>
      <div class="hdr-right">
        <button class="admin-reset-btn" title="Reiniciar Sistema" onclick="triggerAdminReset()">⚙️</button>
        <a href="index.html" class="live-badge" style="background:rgba(255,255,255,0.25); text-decoration:none; color:#fff;">⬅ Volver a Votar</a>
      </div>
    </div>
    <div class="hdr-line"></div>
  </div>

  <div class="results-container">
    <a href="index.html" class="back-btn">← Volver al inicio</a>
    
    <!-- Gráfico Interactivo -->
    <div class="results-card" style="padding: 2rem;">
      <h2 class="results-title" style="margin-bottom: 0.5rem;">Promedio de Estrellas</h2>
      <p class="results-subtitle" style="margin-bottom: 1.5rem;">Calificaciones globales en vivo por cortometraje.</p>
      <div style="position: relative; height:350px; width:100%">
        <canvas id="resultsChart"></canvas>
      </div>
    </div>

    <!-- Tabla Detallada -->
    <div class="results-card">
      <div class="results-header-card">
        <div>
          <h2 class="results-title">Registro de Evaluadores</h2>
          <p class="results-subtitle">Lista detallada de las estrellas dadas por cada evaluador.</p>
        </div>
        <div class="total-box" style="margin-bottom:0; padding:0.8rem 1.2rem;">
          <div><div class="tbl">Total Evaluadores</div></div>
          <div class="tbn" id="r-total" style="font-size:1.6rem; margin-left:1rem;">0</div>
        </div>
      </div>
      <div class="results-table-wrap">
        <table class="results-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Evaluador</th>
              <th>Fecha y Hora</th>
              <th>Calificaciones</th>
            </tr>
          </thead>
          <tbody id="r-tbody">
            <!-- Data will be injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script src="resultados.js"></script>
</body>
</html>
